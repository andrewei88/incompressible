<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INCMPRSBL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root[data-theme="dark"] {
      --bg: #000;
      --text: #d6d9db;
      --text-bright: #e7e9ea;
      --text-dim: #71767b;
      --accent: #b4a0d4;
      --accent-hover: #c9b8e8;
      --border: #2f3336;
    }
    :root[data-theme="light"] {
      --bg: #ffffff;
      --text: #374151;
      --text-bright: #111827;
      --text-dim: #6b7280;
      --accent: #7c3aed;
      --accent-hover: #6d28d9;
      --border: #e5e7eb;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
      line-height: 1.5;
      transition: background 0.2s, color 0.2s;
    }

    .page {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .page-header .logo {
      height: 28px;
      display: block;
    }
    .theme-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      transition: color 0.15s, border-color 0.15s;
    }
    .theme-toggle:hover {
      color: var(--text-bright);
      border-color: var(--text-dim);
    }
    .theme-toggle svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    .page-meta {
      color: var(--text-dim);
      font-size: 13px;
      margin-bottom: 32px;
    }
    .page-meta span {
      color: var(--accent);
      font-weight: 600;
    }

    .search {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search::placeholder { color: var(--text-dim); }
    .search:focus { border-color: var(--accent); }
    .no-results {
      color: var(--text-dim);
      font-size: 14px;
      padding: 24px 0;
      display: none;
    }

    .article-list {
      list-style: none;
    }
    .article-item {
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
    }
    .article-info {
      min-width: 0;
    }
    .article-read-time {
      color: var(--text-dim);
      font-size: 12px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .article-item:first-child {
      border-top: 1px solid var(--border);
    }
    .article-item a {
      color: var(--text-bright);
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      transition: color 0.15s;
    }
    .article-item a:hover {
      color: var(--accent);
    }
    .article-meta {
      color: var(--text-dim);
      font-size: 12px;
      margin-top: 4px;
    }

    @media (max-width: 600px) {
      .page { padding: 32px 20px; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="page-header">
      <img class="logo" src="logo_compressed_cropped.png" alt="INCMPRSBL">
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"><svg viewBox="0 0 24 24"><path class="sun-icon" d="M12 7a5 5 0 100 10 5 5 0 000-10zm0-3a1 1 0 01-1-1V1a1 1 0 112 0v2a1 1 0 01-1 1zm0 18a1 1 0 01-1-1v-2a1 1 0 112 0v2a1 1 0 01-1 1zm9-9h-2a1 1 0 110-2h2a1 1 0 110 2zM4 13H2a1 1 0 110-2h2a1 1 0 110 2zm15.07-6.49a1 1 0 01-.71-.29l-1.41-1.41a1 1 0 111.41-1.41l1.41 1.41a1 1 0 01-.7 1.7zM6.34 19.66a1 1 0 01-.71-.29l-1.41-1.41a1 1 0 111.41-1.41l1.41 1.41a1 1 0 01-.7 1.7zM19.07 19.66a1 1 0 01-.7-1.7l1.41-1.41a1 1 0 111.41 1.41l-1.41 1.41a1 1 0 01-.71.29zM6.34 6.51a1 1 0 01-.7-1.7l1.41-1.41a1 1 0 011.41 1.41L7.05 6.22a1 1 0 01-.71.29z"/><path class="moon-icon" d="M12.3 22a10 10 0 01-7.78-16.23A10.06 10.06 0 0012.3 2a1 1 0 01.81 1.56 6 6 0 007.33 7.33 1 1 0 011.56.81A10 10 0 0112.3 22z" style="display:none"/></svg></button>
    </div>
    <div class="page-meta">{{ARTICLE_COUNT}} articles · <span>{{TOTAL_TIME_SAVED}}</span> saved</div>

    <input type="text" class="search" placeholder="Search articles..." oninput="filterArticles(this.value)">
    <div class="no-results">No articles match your search.</div>
    <ul class="article-list">
      {{ARTICLE_LIST}}
    </ul>
  </div>
  <script>
    function updateToggleIcon(theme) {
      const sun = document.querySelector('.sun-icon');
      const moon = document.querySelector('.moon-icon');
      if (theme === 'dark') {
        sun.style.display = '';
        moon.style.display = 'none';
      } else {
        sun.style.display = 'none';
        moon.style.display = '';
      }
    }

    function toggleTheme() {
      const html = document.documentElement;
      const newTheme = html.dataset.theme === 'dark' ? 'light' : 'dark';
      html.dataset.theme = newTheme;
      updateToggleIcon(newTheme);
      localStorage.setItem('incmprsbl-theme', newTheme);
    }

    function filterArticles(query) {
      const items = document.querySelectorAll('.article-item');
      const noResults = document.querySelector('.no-results');
      const q = query.toLowerCase();
      let visible = 0;
      items.forEach(item => {
        const text = item.querySelector('.article-info').textContent.toLowerCase();
        const match = !q || text.includes(q);
        item.style.display = match ? '' : 'none';
        if (match) visible++;
      });
      noResults.style.display = visible === 0 ? 'block' : 'none';
    }

    (function() {
      const saved = localStorage.getItem('incmprsbl-theme');
      if (saved && saved !== document.documentElement.dataset.theme) {
        document.documentElement.dataset.theme = saved;
        updateToggleIcon(saved);
      }
    })();
  </script>
</body>
</html>
